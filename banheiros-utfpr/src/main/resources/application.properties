spring.datasource.url=jdbc:mysql://localhost:3306/banheiro_utfpr?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.jackson.deserialization.fail-on-unknown-properties=true
spring.jackson.serialization.write-dates-as-timestamps=false

# Seguranca / JWT
# Em producao, defina via variavel de ambiente (JWT_SECRET) com no minimo 32 caracteres.
banheiros.jwt.secret=${JWT_SECRET:troque-esta-chave-secreta-com-no-minimo-32-caracteres}
# Tempo de expiracao em segundos
banheiros.jwt.access-token-expiration=1800
banheiros.jwt.refresh-token-expiration=604800
# Origens permitidas no CORS (front-end)
banheiros.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Usuario admin inicial (criado se a tabela estiver vazia)
banheiros.admin.email=admin@utfpr.edu.br
banheiros.admin.senha=admin123
