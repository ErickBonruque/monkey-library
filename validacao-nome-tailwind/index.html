<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Nome</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold mb-4 text-gray-800">Validação de Nome</h1>

        <label for="nomeInput" class="block text-sm font-medium text-gray-700 mb-1">Digite seu nome:</label>
        <input
            type="text"
            id="nomeInput"
            placeholder="Seu nome aqui..."
            class="w-full border-2 border-gray-300 rounded px-3 py-2 focus:outline-none"
        />

        <p id="mensagem" class="mt-3 text-sm"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
